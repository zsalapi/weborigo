<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Learning Tool</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body>
    <div id="app-wrapper">
      <div id="background-layer">
        <img id="logo" alt="Logo" />
        <img id="white-bg" alt="White Background" />
        <img id="pattern" alt="pattern" />
      </div>

      <div id="content-layer">
        <div id="counters-mobile">
          <div class="counter-item">
            <img class="plus-icon" alt="Plus" />
            <span></span>
          </div>
          <div class="counter-item">
            <img class="minus-icon" alt="Minus" />
            <span>0 / 20</span>
          </div>
        </div>
        <img id="pic" alt="Picture" />
        <div><span id="word">happy</span></div>
        <input id="input" type="text" placeholder="" />
        <img id="letsee" alt="Button" />

        <div id="counters">
          <div class="counter-item">
            <img class="plus-icon" alt="Plus" />
            <span></span>
          </div>
          <div class="counter-item">
            <img class="minus-icon" alt="Minus" />
            <span></span>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="./js/scripts.js"></script>
</html>
